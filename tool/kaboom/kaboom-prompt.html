scene("plat-one-con",() => {

        body(),
        pos(0,100),

 ])

    sprite("checkpoint"),
    scale(.50),
    area(),
    body({isStatic: true}),
    pos(1100,100),
    "checkpoint"
])

 const enemy = add([
    sprite("bean"),
    scale(.75),
    area(),
    body(),
    pos(1000,100),

state("move"),
 ])

enemy.onStateUpdate("move", () => {

	const dir = cursSprite.pos.sub(enemy.pos).unit()
	enemy.move(dir.scale(ENEMY_SPEED))

    onKeyDown("space",() => {

        }
    })
