scene("plat-one-con",() => {

const BULLET_SPEED = 800;
 const cursSprite = add([
        sprite("cursor"),
        scale(.10),
        area(),
        body(),
        pos(0,100),
        "player"
 ])

const checkpoint = add([
    sprite("checkpoint"),
    scale(.20),
    area(),
    body({isStatic: true}),
    pos(1100,100),
    "checkpoint"
])

 const enemy = add([
    sprite("bean"),
    scale(.75),
    area(),
    body(),
    pos(1000,100),

state("move"),
 ])

enemy.onStateUpdate("move", () => {
	if (!cursSprite.exists()) return
	const dir = cursSprite.pos.sub(enemy.pos).unit()
	enemy.move(dir.scale(ENEMY_SPEED))
})

/* Platforms*/

    add([

      area(),

     add([

        body({isStatic: true}),
     ])

        cursSprite.move(-movSpeed,0);
    })

    onKeyDown("right",() => {
        cursSprite.move(movSpeed,0);
    })

    onKeyDown("space",() => {
        if(cursSprite.isGrounded()) {
          cursSprite.jump();
        }
    })

// Testing Circumstances (Conjugation).

    cursSprite.onCollide("enemy",() => {
