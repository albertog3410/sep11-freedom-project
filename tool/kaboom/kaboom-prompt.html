<script type="module">
import kaboom from "https://unpkg.com/kaboom@3000.0.1/dist/kaboom.mjs";
kaboom();
// ------------------------------------------------------------------------------------------

/* Setting up Variables */

var conListQues = ["Hablar; Yo (Present Tense)", "Vivir; El (Present Tense)","Salir; Nosotras (Present Tense)","Beber; Ella (Present Tense)","Pintar; Ustedes (Present Tense)"];
var conListAns = ["Hablo","Vive","Salimos","Bebe","Pintan"]
console.log(conListQues);
var movSpeed = 500;
setGravity(1000);

add([
    text("Click here to play!"),
    pos(500,250),
    area(),
    "title-card"
])
onClick("title-card", () => go("option-sect")),

scene("option-sect",() => {
    add([
        text("Vocabulary"),
        pos(250,250),
        area(),
        "vocab"
    ])

    add([
        text("Conjugation"),
        pos(800,250),
        area(),
        "conjugation"
    ])

    onClick("vocab", () => go("plat-one"));

scene("plat-one",() => {
/* Necessary Sprites */

 loadSprite("cursor", "sprites/cursor.png");
 loadBean("bean")
// enemy


const SPEED = 500
const ENEMY_SPEED = 500;
const BULLET_SPEED = 800;




 const enemy = add([
    sprite("bean"),
    scale(.75),
    area(),
    body(),
    pos(1000,100),
state("move", [ "idle", "attack", "move" ]),
 ])


enemy.onStateEnter("idle", async () => {
	await wait(0.5)
	enemy.enterState("attack")
})

// When we enter "attack" state, we fire a bullet, and enter "move" state after 1 sec
enemy.onStateEnter("attack", async () => {

	// Don't do anything if player doesn't exist anymore
	if (cursSprite.exists()) {

		const dir = cursSprite.pos.sub(enemy.pos).unit()

		add([
			pos(enemy.pos),
			move(dir, BULLET_SPEED),
			rect(12, 12),
			area(),
			offscreen({ destroy: true }),
			anchor("center"),
			color(BLUE),
			"bullet",
		])

	}

	await wait(1)
	enemy.enterState("move")

})

enemy.onStateEnter("move", async () => {
	await wait(2)
	enemy.enterState("idle")
})

// Like .onUpdate() which runs every frame, but only runs when the current state is "move"
// Here we move towards the player every frame if the current state is "move"
enemy.onStateUpdate("move", () => {
	if (!cursSprite.exists()) return
	const dir = cursSprite.pos.sub(enemy.pos).unit()
	enemy.move(dir.scale(ENEMY_SPEED))
})

onKeyDown("left", () => {
	// .move() is provided by pos() component, move by pixels per second
	player.move(-SPEED, 0)
})

onKeyDown("right", () => {
	player.move(SPEED, 0)
})




 var cursSprite = add([
        sprite("cursor"),
        scale(.10),
        area(),
        body(),
        pos(0,100),

onKeyPress("space", () => {
   if (cursSprite.isGrounded()) {
 cursSprite.jump(800);
   }
})








/* Platform */

    ])
    add([
      rect(width(), 48),
      pos(0,height() - 48),
      area(),
      body({isStatic: true}),
    ])


cursSprite.onCollide("bullet",() => {
    go("test-page");

    })
})

    scene("test-page",() => {
       var quesNum = randi(0,4);
       var ques = prompt(conListQues[quesNum]);
        if(ques == conListAns[quesNum]) {
        console.log("That's correct!");

    } else {
        console.log("Study Harder Bozo.");
        go("plat-one");
    }
    })


})


</script>
